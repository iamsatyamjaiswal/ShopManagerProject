<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Shop Manager</title>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{font-family:Arial;margin:0;background:#f4f6f8}
header{background:#111827;color:#fff;padding:15px;font-size:22px}
.container{padding:20px}
.card{background:#fff;padding:15px;margin-bottom:15px;border-radius:8px}
button{padding:8px 12px;background:#2563eb;color:#fff;border:none;border-radius:6px}
</style>
</head>

<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen"
style="position:fixed;inset:0;background:#111827;
display:flex;align-items:center;justify-content:center;z-index:999">

<div style="background:#fff;padding:30px;border-radius:10px;width:300px;text-align:center">
<h3>Shop Login</h3>

<input id="loginUser" placeholder="Email"><br><br>
<input id="loginPass" type="password" placeholder="Password"><br><br>

<button onclick="loginUserAuth()">Login</button>
<p id="loginError" style="color:red"></p>
</div>
</div>

<header>🧾 Clothes Shop Manager</header>

<div class="container">
<div class="card">
<h3>Welcome</h3>
<p>Login successful — app ready.</p>
</div>
</div>

<script>
/* ================= SUPABASE ================= */

const SUPABASE_URL="https://ikdtnmcgdezcyplygywa.supabase.co";
const SUPABASE_KEY="sb_publishable_-H2eKdwodYNDRU88G8pjjA_DAaN30AC";

const supabase = window.supabase.createClient(
  SUPABASE_URL,
  SUPABASE_KEY
);

/* ================= ROLE ================= */

let USER_ROLE="staff";

async function loadUserRole(uid){

 const { data } = await supabase
   .from('user_roles')
   .select('role')
   .eq('user_id', uid)
   .single();

 USER_ROLE = data?.role || "staff";

 console.log("Logged in as:", USER_ROLE);
}

/* ================= LOGIN ================= */
/* IMPORTANT → GLOBAL FUNCTION */
window.loginUserAuth = async function(){

 const email = document.getElementById("loginUser").value;
 const password = document.getElementById("loginPass").value;

 const { data, error } =
   await supabase.auth.signInWithPassword({
     email,
     password
   });

 if(error){
   document.getElementById("loginError").innerText = error.message;
   return;
 }

 await loadUserRole(data.user.id);

 document.getElementById("loginScreen").style.display="none";

 initApp();
};

/* ================= SESSION RESTORE ================= */

async function checkSession(){

 const { data } = await supabase.auth.getSession();

 if(data.session){
   await loadUserRole(data.session.user.id);
   document.getElementById("loginScreen").style.display="none";
   initApp();
 }
}

checkSession();

/* ================= APP START ================= */

function initApp(){
 console.log("App Started ✅");
}

</script>

</body>
</html>
