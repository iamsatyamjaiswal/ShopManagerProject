<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Shop Manager</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="xlsx.full.min.js"></script>
<script src="chart.umd.min.js"></script>

<style>
body{font-family:Arial;margin:0;background:#f4f6f8}
header{background:#111827;color:#fff;padding:15px;font-size:22px}
.container{padding:20px}
.card{background:#fff;padding:15px;margin-bottom:15px;border-radius:8px}
button{padding:8px 12px;background:#2563eb;color:#fff;border:none;border-radius:6px;cursor:pointer}
.delete{background:#dc2626}
.edit{background:#059669}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen" style="position:fixed;inset:0;background:#111827;display:flex;align-items:center;justify-content:center;">
<div style="background:white;padding:30px;border-radius:10px;width:300px;text-align:center">
<h3>Shop Login</h3>
<input id="loginUser" placeholder="Email"><br><br>
<input id="loginPass" type="password" placeholder="Password"><br><br>
<button onclick="loginUserAuth()">Login</button>
<p id="loginError" style="color:red"></p>
</div>
</div>

<header>🧾 Clothes Shop Manager</header>

<div class="container">

<div class="card">
<h3>Add Product</h3>
<input id="product" placeholder="Product">
<input id="price" type="number" placeholder="Price">
<input id="stock" type="number" placeholder="Stock">
<button onclick="addItem()">Save</button>
</div>

<div class="card">
<h3>Inventory</h3>
<table border="1" width="100%">
<thead><tr><th>Product</th><th>Price</th><th>Stock</th></tr></thead>
<tbody id="inventoryBody"></tbody>
</table>
</div>

<div class="card">
<h3>Create Bill</h3>
<select id="billProduct"></select>
<input id="billQty" type="number" placeholder="Qty">
<button onclick="addBillItem()">Add</button>

<div id="billItems"></div>
<button onclick="saveBill()">Save Bill</button>
</div>

</div>

<script>
/* ================= SUPABASE ================= */

const SUPABASE_URL="https://ikdtnmcgdezcyplygywa.supabase.co";
const SUPABASE_KEY="sb_publishable_-H2eKdwodYNDRU88G8pjjA_DAaN30AC";

const supabase=window.supabase.createClient(
SUPABASE_URL,SUPABASE_KEY);

/* ================= STATE ================= */

let inventory=[];
let currentBill=[];
let USER_ROLE="staff";

/* ================= LOGIN ================= */

async function loginUserAuth(){

const email=loginUser.value;
const password=loginPass.value;

const {data,error}=await supabase.auth.signInWithPassword({
email,password});

if(error){
loginError.innerText="Invalid login";
return;
}

await loadUserRole(data.user.id);

loginScreen.style.display="none";
initApp();
}

/* SESSION RESTORE */

async function checkSession(){
const {data}=await supabase.auth.getSession();

if(data.session){
await loadUserRole(data.session.user.id);
loginScreen.style.display="none";
initApp();
}
}
checkSession();

/* ================= ROLES ================= */

async function loadUserRole(uid){

const {data}=await supabase
.from("user_roles")
.select("role")
.eq("user_id",uid)
.single();

USER_ROLE=data?.role||"staff";
applyPermissions();
}

function applyPermissions(){
if(USER_ROLE==="staff"){
document.querySelectorAll('.delete,.edit')
.forEach(b=>b.style.display="none");
}
}

/* ================= INIT ================= */

async function initApp(){
await loadInventory();
renderInventory();
}

/* ================= INVENTORY ================= */

async function loadInventory(){
const {data}=await supabase.from("inventory").select("*");
inventory=data||[];
}

async function addItem(){

const obj={
product:product.value,
price:Number(price.value),
stock:Number(stock.value)
};

await supabase.from("inventory").insert([obj]);

inventory.push(obj);
renderInventory();

product.value="";
price.value="";
stock.value="";
}

function renderInventory(){

const body=document.getElementById("inventoryBody");
const select=document.getElementById("billProduct");

body.innerHTML="";
select.innerHTML="";

inventory.forEach(p=>{
body.innerHTML+=`
<tr>
<td>${p.product}</td>
<td>${p.price}</td>
<td>${p.stock}</td>
</tr>`;

select.innerHTML+=`<option>${p.product}</option>`;
});
}

/* ================= BILLING ================= */

function addBillItem(){

const prod=billProduct.value;
const qty=Number(billQty.value);

const item=inventory.find(x=>x.product===prod);

currentBill.push({
product:prod,
qty:qty,
amount:item.price*qty
});

renderBill();
}

function renderBill(){
billItems.innerHTML=currentBill.map(
b=>`${b.product} x ${b.qty} = ₹${b.amount}`
).join("<br>");
}

async function saveBill(){

let total=currentBill.reduce((s,x)=>s+x.amount,0);

await supabase.from("bills").insert([{
bill_date:new Date(),
customer:"Walk-in",
total:total,
items:currentBill
}]);

alert("Bill Saved (Cloud)");

currentBill=[];
renderBill();
}

/* ========================================= */
</script>

</body>
</html>
